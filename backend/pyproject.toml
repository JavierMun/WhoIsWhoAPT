[tool.pytest.ini_options]
pythonpath = ["."]

[tool.black]
line-length = 120
target-version = ["py312"]

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["pydantic.mypy"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["pycti", "pycti.*", "mitreattack", "mitreattack.*", "apscheduler", "apscheduler.*"]
ignore_missing_imports = true
ignore_errors = true

